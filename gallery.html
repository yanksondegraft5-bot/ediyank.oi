<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121826;   /* soft dark (NOT too black) */
color:#ffffff;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(20,25,40,.85);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
width:55px;
height:55px;
object-fit:contain;
border-radius:0;
}

.brand-title{
font-size:1.4rem;
color:gold; /* soft blue */
font-weight:bold;
}

/* NAV */
nav ul{
display:flex;
gap:15px;
list-style:none;
}

nav a{
text-decoration:none;
color:#ddd;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */
.hero{
text-align:center;
padding:50px 25px;
background:linear-gradient(135deg,rgba(56,189,248,.1),transparent);
}

.hero h1{
font-size:2.8rem;
color:gold;
}

.hero p{
max-width:650px;
margin:10px auto;
color:blue;
line-height:1.6;
}

/* SECTION TITLE */
.section-title{
margin:25px 25px 10px;
font-size:1.2rem;
color:gold;
font-weight:bold;
}

/* ROW (Netflix style) */
.row{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 25px;
scroll-behavior:smooth;
}

.row::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
min-width:180px;
height:260px;
border-radius:15px;
overflow:hidden;
flex-shrink:0;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.5);
border:1px solid rgba(255,255,255,.06);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 15px 35px rgba(56,189,248,.25);
}

/* LIGHTBOX */
.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:2000;
}

.lightbox:target{
display:flex;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:15px;
box-shadow:0 0 30px rgba(56,189,248,.2);
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
text-decoration:none;
background:rgba(255,255,255,.1);
padding:5px 12px;
border-radius:50%;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
margin-top:40px;
background:rgba(20,25,40,.9);
color:#aaa;
border-top:1px solid rgba(255,255,255,.08);
}

</style>
</head>

<body>
