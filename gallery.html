<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
transition:.3s;
}

/* HEADER */
header{
background:linear-gradient(135deg,rgb(28,28,78),rgb(36,63,196));
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.header-brand{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:3px solid #00ffff;
}

.brand-title{
font-size:1.4rem;
color:white;
}

/* NAV */
nav ul{
list-style:none;
display:flex;
gap:15px;
}

nav a{
text-decoration:none;
color:white;
padding:8px 12px;
border-radius:10px;
transition:.3s;
}

nav a:hover{
background:#00ffff;
color:#000;
}

/* HERO */
.gallery-hero{
text-align:center;
padding:50px 20px;
}

.gallery-hero h1{
font-size:2.8rem;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

.gallery-hero p{
max-width:700px;
margin:auto;
color:#ddd;
line-height:1.6;
}

/* SECTION TITLES */
h2{
text-align:center;
margin:25px 0;
color:#00ffff;
text-shadow:0 0 10px #00ffff;
}

/* BUTTON */
#modeToggle{
display:block;
margin:10px auto;
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
background:#00ffff;
color:black;
font-weight:bold;
}

/* GALLERY GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,.4);
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05) translateY(-5px);
box-shadow:0 15px 35px rgba(0,255,255,.2);
}

/* LIGHTBOX */
.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox:target{
display:flex;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:20px;
box-shadow:0 0 30px rgba(255,255,255,.2);
}

.close-btn{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
text-decoration:none;
background:rgba(255,255,255,.1);
padding:5px 12px;
border-radius:50%;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
margin-top:40px;
background:#111827;
color:#ccc;
}

/* LIGHT MODE */
.light{
background:#f5f5f5;
color:#111;
}

.light header{
background:#ffffff;
color:#111;
}

.light nav a{
color:#111;
}

.light footer{
background:#eee;
color:#111;
}

</style>
</head>
